name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Provenance
        run: npm audit signatures

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Test Results
          path: junit.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: junit.xml
          retention-days: 30

      - name: Run benchmark
        run: npm run benchmark -- --junit ${{ github.workspace }}/benchmark-results.xml

      - name: Publish benchmark results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Benchmark Results
          path: benchmark-results.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.xml
          retention-days: 30

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
