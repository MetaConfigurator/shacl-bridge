name: Benchmark

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run benchmark
        run: npm run benchmark -- --junit ${{ github.workspace }}/benchmark-results.xml

      - name: Publish benchmark results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Benchmark Results
          path: benchmark-results.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload benchmark report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: benchmark-results.xml
          retention-days: 30