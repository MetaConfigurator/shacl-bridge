name: CLI Tests

on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]

jobs:
  cli-integration-tests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        node-version: [ 18.x, 20.x, 22.x ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CLI tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./cli-tests/cli-tests.sh

      - name: Run CLI tests (Windows)
        if: runner.os == 'Windows'
        run: .\cli-tests\cli-tests-windows.ps1
        shell: pwsh

      - name: Upload test output artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-test-output-${{ matrix.os }}-${{ matrix.node-version }}
          path: |
            /tmp/shacl-cli-test-*
            ${{ runner.temp }}/shacl-cli-test-*
          retention-days: 7